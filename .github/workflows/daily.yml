name: Daily ProspectaAí (dry-run)

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      PROSPECTAAI_DRY_RUN: "1"
      PROSPECTAAI_FAST_SLEEP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run daily tasks (dry-run)
        run: |
          chmod +x run_daily.sh
          ./run_daily.sh
